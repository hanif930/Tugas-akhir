<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-box">
    <form id="loginForm">

      <h1>Login</h1>

      <div class="input-box">
        <input type="text" id="username" placeholder="hanif" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="12345" required>
      </div>

      <br>
      
      <button type="submit" class="btn">Login</button>

      <p id="pesan"></p>

    </form>
  </div>
  

  <script>
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const pesan = document.getElementById("pesan");

      if (username === "hanif" && password === "12345") {
        pesan.innerHTML = "Login berhasil!";
        pesan.style.color = "green";

        setTimeout(function() {
          window.location.href = "pplg.html";
        }, 1000);

      } else {
        pesan.innerHTML = "Username atau password salah!";
        pesan.style.color = "red";
      }
    });
  </script>

</body>
</html>
